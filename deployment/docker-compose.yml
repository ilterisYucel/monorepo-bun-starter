version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: battery-timescaledb
    command:
      - -cshared_buffers=32MB
      - -cwork_mem=4MB
      - -ceffective_cache_size=96MB
      - -cmaintenance_work_mem=16MB
      - -cmax_connections=50
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: battery
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    networks:
      - battery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d battery"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: battery-redis
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - battery-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 128m

  device-service:
    build:
      context: ../
      dockerfile: packages/services/device-service/deployment/Dockerfile
    container_name: battery-device-service
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEVICE_CONFIG_DIR: /app/config-docker
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../packages/services/device-service/deployment/config-docker:/app/config-docker:ro
    networks:
      - battery-network
    restart: unless-stopped
    mem_limit: 256m

  data-service:
    build:
      context: ../
      dockerfile: packages/services/data-service/deployment/Dockerfile
    container_name: battery-data-service
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_USER: postgres
      TIMESCALE_PASSWORD: password
      TIMESCALE_DATABASE: battery
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - battery-network
    restart: unless-stopped
    mem_limit: 256m

  web-service:
    build:
      context: ../
      dockerfile: packages/services/web-service/deployment/Dockerfile
    container_name: battery-web-service
    environment:
      NODE_ENV: production
      PORT: 5001
      HOST: 0.0.0.0
      JWT_SECRET: dev-secret-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DATABASE: battery
      DEVICE_CONFIG_DIR: /app/packages/services/device-service/config
    ports:
      - "5001:5001"
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - battery-network
    restart: unless-stopped
    mem_limit: 256m

  web:
    build:
      context: ../
      dockerfile: apps/web/deployment/Dockerfile
    container_name: battery-web
    environment:
      NODE_ENV: production
    ports:
      - "80:80"
    depends_on:
      - web-service
    networks:
      - battery-network
    restart: unless-stopped
    mem_limit: 128m

volumes:
  timescale-data:
  redis-data:

networks:
  battery-network:
    driver: bridge
