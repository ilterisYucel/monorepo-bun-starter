services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: battery-timescaledb-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: battery
    ports:
      - "5432:5432"
    volumes:
      - timescale-data-dev:/var/lib/postgresql/data
    networks:
      - battery-network-dev

  redis:
    image: redis:7-alpine
    container_name: battery-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - battery-network-dev

  demo-backend:
    build:
      context: ../
      dockerfile: apps/demo-backend/deployment/Dockerfile.dev
    container_name: battery-demo-backend-dev
    environment:
      NODE_ENV: development
      PORT: 5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_USER: postgres
      TIMESCALE_PASSWORD: password
      TIMESCALE_DATABASE: battery
      MODBUS_HOST: host.docker.internal
      MODBUS_PORT: 502
    ports:
      - "5000:5000"
    volumes:
      - ../apps/demo-backend/src:/app/apps/demo-backend/src
      - ../packages/core/src:/app/packages/core/src
      - ../packages/shared-types/src:/app/packages/shared-types/src
      - ../packages/simulators/src:/app/packages/simulators/src
    depends_on:
      - timescaledb
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - battery-network-dev

  web:
    build:
      context: ../
      dockerfile: apps/web/deployment/Dockerfile.dev
    container_name: battery-web-dev
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../apps/web/index.html:/app/apps/web/index.html
      - ../packages/shared-types/src:/app/packages/shared-types/src
      - ../packages/shared-utils/src:/app/packages/shared-utils/src
      - ../packages/ui/src:/app/packages/ui/src
      - ../tsconfig.base.json:/app/tsconfig.base.json
      - /app/apps/web/node_modules
      - /app/node_modules
    depends_on:
      - demo-backend
    networks:
      - battery-network-dev

volumes:
  timescale-data-dev:
  redis-data-dev:

networks:
  battery-network-dev:
    driver: bridge
