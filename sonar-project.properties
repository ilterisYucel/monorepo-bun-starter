# SonarCloud Monorepo Configuration
sonar.organization=ilterisyucel
sonar.projectKey=gd-pms-monorepo
sonar.projectName=GD PMS Monorepo

sonar.sources=apps,packages
sonar.exclusions=\
  **/dist/**,\
  **/node_modules/**,\
  **/out/**,\
  **/release/**,\
  **/coverage/**,\
  **/.nx/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/scripts/**

sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.base.json

# Quality gate: fail CI if gate fails
sonar.qualitygate.wait=true

# Pull request decoration
sonar.pullrequest.github.repository=ilterisYucel/monorepo-bun-starter
sonar.pullrequest.provider=github

# Scanner-specific source dirs for each language
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info

# Report test results when available
# sonar.testExecutionReportPaths=test-report.xml
